<!DOCTYPE html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>子平八字命盤</title>
<style>
    body { text-align: center; font-family: sans-serif; background: #f9f7f0; padding: 20px; }
    h1 { color: #8B4513; margin-bottom: 15px; }
    
    .input-row { display: flex; flex-wrap: wrap; justify-content: center; gap: 12px; margin-bottom: 25px; }
    .input-row input, .input-row select, .input-row button { 
        padding: 12px; font-size: 1.0em; border: 2px solid #8B4513; border-radius: 8px; width: 120px; 
    }
    .input-row button { background: #8B4513; color: white; cursor: pointer; font-weight: bold; }

    #gender { width: 60px !important; }
    #currentYear { width: 120px !important; }
    button[onclick="setNow()"] { width: 70px !important; }

    .result-box { max-width: 820px; margin: 0 auto; padding: 25px; background: white; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
    .lunar-line { font-size: 1.0em; margin-bottom: 25px; color: #8B4513; font-weight: bold; line-height: 1.6; }
    
    table.pillars { margin: 20px auto; border-collapse: collapse; width: 100%; max-width: 680px; font-size: 1.35em; }
    .pillars td { padding: 8px 6px; border: 2px solid #D2B48C; text-align: center; vertical-align: middle; }
    .hidden-stem { font-size: 0.70em; line-height: 1.05; color: #555; margin: 1px 0; }

    .gods-table { margin: 25px auto 0; border-collapse: collapse; width: 100%; max-width: 680px; font-size: 1.0em; }
    .gods-table th, .gods-table td { padding: 10px 8px; border: 1px solid #D2B48C; text-align: center; }
    .gods-table th { background: #f9f7f0; }

    .current-term { font-size: 1.5em; font-weight: bold; color: #8B4513; margin: 25px 0 15px; }
    .days-container { display: flex; justify-content: center; gap: 20px; margin: 15px 0 25px; }
    .days-box { background: #fffaf0; padding: 12px 20px; border-radius: 8px; border: 2px solid #D2B48C; width: 210px; font-size: 1.05em; }
    .days-box strong { font-size: 1.35em; color: #8B4513; }

    table.daiyun { margin: 30px auto 0; border-collapse: collapse; width: 100%; max-width: 680px; font-size: 1.0em; }
    .daiyun th, .daiyun td { padding: 10px 6px; border: 1px solid #D2B48C; text-align: center; }
    .daiyun th { background: #f9f7f0; }

    .source-info { margin-top: 30px; padding: 12px; background: #fffaf0; border-radius: 8px; font-size: 0.95em; color: #555; text-align: left; }
</style>
</head>
<body>

<div style="position:relative; width:100%; text-align:left; margin-bottom:20px; padding-left:20px;">
    <h1 id="mainTitle" style="display:inline-block; margin:0; font-size:1.8em;">子平八字命盤</h1>
    <button onclick="toggleGamChuMode()" 
            style="position:absolute; right:20px; top:1px; padding:8px 8px; background:#f9e79f; color:#8B4513; border:none; border-radius:8px; cursor:pointer; font-size:1.0em; font-weight:bold;">
        💰 金主模式
    </button>
</div>

<div class="input-row">
    <input type="date" id="mydate" onchange="queryBaziFate()">
    <input type="time" id="mytime" value="00:00" onchange="queryBaziFate()">
    <select id="gender" onchange="queryBaziFate()">
        <option value="男">男</option>
        <option value="女">女</option>
    </select>
    <input type="date" id="currentYear" onchange="queryBaziFate()">
    <button onclick="setNow()">重設</button>
</div>

<!-- 金主模式專用紀錄區 -->
<div id="jinZhuRecordArea" style="display:none; margin:20px auto; max-width:820px; text-align:center;">
    <div style="background:#fffaf0; padding:18px; border-radius:12px; border:2px solid #f9e79f;">
        <input type="text" id="userName" placeholder="姓名" style="width:50px; padding:10px; margin:5px;">
        <input type="text" id="userNote" placeholder="備註（選填）" style="width:160px; padding:10px; margin:5px;">
        
        <button onclick="saveBaziRecord()" style="padding:10px 15px; background:#d4af37; color:#8B4513; border:none; border-radius:8px; margin:5px; font-weight:bold;">儲存</button>
        <select id="recordSelect" onchange="loadBaziRecord(this.value)" style="padding:10px; margin:5px; width:120px;">
            <option value="">-- 選擇紀錄 --</option>
        </select>
        <button onclick="deleteCurrentRecord()" style="padding:10px 15px; background:#ef4444; color:white; border:none; border-radius:8px; margin:5px; font-weight:bold;">刪除</button>
        <button onclick="exportRecords()" style="padding:10px 15px; background:#3b82f6; color:white; border:none; border-radius:8px; margin:5px; font-weight:bold;">匯出</button>
        <label style="margin:5px;">
            <button onclick="document.getElementById('importFile').click()" style="padding:10px 15px; background:#10b981; color:white; border:none; border-radius:8px; font-weight:bold;">匯入</button>
            <input type="file" id="importFile" accept=".json" style="display:none;" onchange="importRecords(event)">
        </label>
    </div>
</div>

<div id="here" class="result-box"></div>

<script src="bazi-calculator.js"></script>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
<script src="Firebase4p8c.js"></script>

<script>
// 初始化 Firebase
firebase.initializeApp(window.firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();
auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL);
</script>

<script src="MessageBox.js"></script>
<script src="GamChuMode.js"></script>
<script src="bazi-renderer.js"></script>

<script>
let baziData = null;

async function loadBaziData() {
    if (baziData) return baziData;
    try {
        const res = await fetch('bazi-data.json');
        baziData = await res.json();
        return baziData;
    } catch (e) { return null; }
}
window.loadBaziData = loadBaziData;

function saveToLocal() {
    const date = document.getElementById('mydate').value;
    const time = document.getElementById('mytime').value;
    const gender = document.getElementById('gender').value;
    localStorage.setItem('baziLastDate', date);
    localStorage.setItem('baziLastTime', time);
    localStorage.setItem('baziLastGender', gender);
}

function loadFromLocal() {
    const savedDate = localStorage.getItem('baziLastDate');
    const savedTime = localStorage.getItem('baziLastTime');
    const savedGender = localStorage.getItem('baziLastGender');
    if (savedDate) document.getElementById('mydate').value = savedDate;
    if (savedTime) document.getElementById('mytime').value = savedTime;
    if (savedGender) document.getElementById('gender').value = savedGender;
}

function setNow() {
    const now = new Date();
    const nowInHK = new Date(now.getTime() + 8 * 3600 * 1000);
    document.getElementById('mydate').value = nowInHK.toISOString().split('T')[0];
    document.getElementById('mytime').value = nowInHK.toISOString().split('T')[1].slice(0, 5);
    document.getElementById('gender').value = '男';
    document.getElementById('currentYear').value = nowInHK.getFullYear();
    saveToLocal();
    queryBaziFate();
}

// queryBaziFate 已被抽離到 bazi-renderer.js
async function queryBaziFate() {
    if (typeof window.renderBaziFate === 'function') {
        await window.renderBaziFate();
    } else {
        console.warn('bazi-renderer.js 尚未載入');
    }
}

window.onload = () => {
    loadFromLocal();
    if (!document.getElementById('mydate').value) {
        const now = new Date();
        const nowInHK = new Date(now.getTime() + 8 * 3600 * 1000);
        document.getElementById('mydate').value = nowInHK.toISOString().split('T')[0];
        document.getElementById('mytime').value = nowInHK.toISOString().split('T')[1].slice(0, 5);
        document.getElementById('gender').value = '男';
    }
    
    const savedMode = localStorage.getItem('gamChuMode');
    if (savedMode === 'true') {
        isGamChuMode = true;
    }
    updateMainTitleColor();
    
    const recordArea = document.getElementById('jinZhuRecordArea');
    if (recordArea && isGamChuMode) {
        recordArea.style.display = 'block';
    }
    
    queryBaziFate();
};

// 金主模式 - 主標題顏色控制
function updateMainTitleColor() {
    const title = document.getElementById('mainTitle');
    if (title) {
        title.style.color = isGamChuMode ? '#d4af37' : '#8B4513';
    }
}

// 覆蓋 GamChuMode.js 中的切換函數
window.toggleGamChuSwitch = function() {
    isGamChuMode = !isGamChuMode;
    localStorage.setItem('gamChuMode', isGamChuMode);
    updateSwitchUI();
    updateMainTitleColor();

    const recordArea = document.getElementById('jinZhuRecordArea');
    if (recordArea) {
        recordArea.style.display = isGamChuMode ? 'block' : 'none';
    }
};

// 金主模式 - 姓名與紀錄功能
let currentLoadedRecordId = null;

function saveBaziRecord() {
    const name = document.getElementById('userName').value.trim();
    if (!name) {
        alert("請輸入姓名！");
        return;
    }

    const records = JSON.parse(localStorage.getItem('baziRecords') || '[]');
    
    const record = {
        id: Date.now(),
        name: name,
        note: document.getElementById('userNote').value.trim(),
        date: document.getElementById('mydate').value,
        time: document.getElementById('mytime').value,
        gender: document.getElementById('gender').value,
        year: document.getElementById('currentYear').value
    };

    records.unshift(record);
    if (records.length > 30) records.pop();

    localStorage.setItem('baziRecords', JSON.stringify(records));
    loadRecordOptions();
    if (currentUser) {
        saveToCloud();
    }
    alert("✅ 已儲存紀錄：" + name);
}

function loadBaziRecord(id) {
    if (!id) return;
    const records = JSON.parse(localStorage.getItem('baziRecords') || '[]');
    const record = records.find(r => r.id == id);
    if (!record) return;

    currentLoadedRecordId = record.id;

    document.getElementById('userName').value = record.name || '';
    document.getElementById('userNote').value = record.note || '';
    document.getElementById('mydate').value = record.date;
    document.getElementById('mytime').value = record.time;
    document.getElementById('gender').value = record.gender;
    if (record.year) document.getElementById('currentYear').value = record.year;
    
    queryBaziFate();
}

function deleteCurrentRecord() {
    if (!currentLoadedRecordId) {
        alert("請先選擇要刪除的紀錄！");
        return;
    }

    if (!confirm("確定要刪除這筆紀錄嗎？此操作無法復原。")) return;

    let records = JSON.parse(localStorage.getItem('baziRecords') || '[]');
    records = records.filter(r => r.id != currentLoadedRecordId);
    
    localStorage.setItem('baziRecords', JSON.stringify(records));

    document.getElementById('userName').value = '';
    document.getElementById('userNote').value = '';
    currentLoadedRecordId = null;

    loadRecordOptions();

    if (currentUser) {
        saveToCloud();
    }

    alert("✅ 已刪除紀錄並同步到雲端");
    setNow();
}

function loadRecordOptions() {
    const select = document.getElementById('recordSelect');
    const records = JSON.parse(localStorage.getItem('baziRecords') || '[]');
    select.innerHTML = '<option value="">-- 選擇紀錄 --</option>';
    
    records.forEach(r => {
        const opt = document.createElement('option');
        opt.value = r.id;
        opt.textContent = r.name + (r.note ? ` (${r.note})` : '');
        select.appendChild(opt);
    });
}

window.addEventListener('load', () => {
    loadRecordOptions();
});

function exportRecords() {
    const records = JSON.parse(localStorage.getItem('baziRecords') || '[]');
    if (records.length === 0) {
        alert("目前沒有任何紀錄可匯出！");
        return;
    }
    
    const dataStr = JSON.stringify(records, null, 2);
    const dataUri = 'data:application/json;charset=utf-8,'+ encodeURIComponent(dataStr);
    
    const exportFileDefaultName = `bazi_records_${new Date().toISOString().slice(0,10)}.json`;
    
    const linkElement = document.createElement('a');
    linkElement.setAttribute('href', dataUri);
    linkElement.setAttribute('download', exportFileDefaultName);
    linkElement.click();
}

function importRecords(event) {
    const file = event.target.files[0];
    if (!file) return;
    
    const reader = new FileReader();
    reader.onload = function(e) {
        try {
            const importedRecords = JSON.parse(e.target.result);
            if (!Array.isArray(importedRecords)) {
                alert("檔案格式錯誤！請匯入正確的紀錄 JSON 檔。");
                return;
            }
            
            let currentRecords = JSON.parse(localStorage.getItem('baziRecords') || '[]');
            currentRecords = [...currentRecords, ...importedRecords];
            
            const unique = {};
            currentRecords.forEach(r => unique[r.id] = r);
            currentRecords = Object.values(unique);
            
            localStorage.setItem('baziRecords', JSON.stringify(currentRecords));
            loadRecordOptions();
            alert(`✅ 已成功匯入 ${importedRecords.length} 筆紀錄！`);
        } catch (err) {
            alert("匯入失敗！檔案格式不正確。");
        }
    };
    reader.readAsText(file);
    event.target.value = '';
}

// 神煞詳細說明彈窗（使用 MessageBox）
function showGodDetail(godName) {
    const data = window.baziData;
    if (!data || !data.daily12GodsMeaning) {
        alert("資料載入中，請稍後再試...");
        return;
    }

    const meaning = data.daily12GodsMeaning[godName];
    if (!meaning) {
        alert(`尚無「${godName}」的詳細資料`);
        return;
    }

    const contentHTML = `
        <p><strong>吉兇：</strong> ${meaning.luck}</p>
        <p><strong>星性：</strong> ${meaning.nature}</p>
        <p style="margin-top:16px; color:#444; white-space:pre-line;">${meaning.detail}</p>
    `;

    showMessageBox(godName, contentHTML);
}
window.showGodDetail = showGodDetail;

</script>

</body>
</html>
