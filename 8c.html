<!DOCTYPE html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>八字命盤</title>
<style>
    body { text-align: center; font-family: sans-serif; background: #f9f7f0; padding: 20px; }
    h1 { color: #8B4513; margin-bottom: 15px; }
    .input-row { display: flex; flex-wrap: wrap; justify-content: center; gap: 12px; margin-bottom: 25px; }
    .input-row input, .input-row select { padding: 12px; font-size: 1.1em; border: 2px solid #8B4513; border-radius: 8px; width: 220px; }
    .result-box { max-width: 780px; margin: 0 auto; padding: 25px; background: white; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
    .lunar-line { font-size: 1.45em; margin-bottom: 25px; color: #8B4513; font-weight: bold; }
    table.pillars { margin: 20px auto; border-collapse: collapse; width: 100%; max-width: 520px; font-size: 1.35em; }
    .pillars td { padding: 8px 6px; border: 2px solid #D2B48C; text-align: center; vertical-align: middle; }
    .hidden-stem { font-size: 0.85em; line-height: 1.1; color: #555; }
    .gods-table { margin: 25px auto 0; border-collapse: collapse; width: 100%; max-width: 520px; font-size: 1.1em; }
    .gods-table th, .gods-table td { padding: 10px 8px; border: 1px solid #D2B48C; text-align: center; }
    .gods-table th { background: #f9f7f0; }
    .current-term { font-size: 1.5em; font-weight: bold; color: #8B4513; margin: 25px 0 15px; }
    .days-container { display: flex; justify-content: center; gap: 20px; margin: 15px 0 25px; }
    .days-box { background: #fffaf0; padding: 12px 20px; border-radius: 8px; border: 2px solid #D2B48C; width: 210px; font-size: 1.05em; }
    .days-box strong { font-size: 1.35em; color: #8B4513; }
    table.daiyun { margin: 30px auto 0; border-collapse: collapse; width: 100%; max-width: 680px; font-size: 1.1em; }
    .daiyun th, .daiyun td { padding: 10px 6px; border: 1px solid #D2B48C; text-align: center; }
    .daiyun th { background: #f9f7f0; }
    .source-info { margin-top: 30px; padding: 12px; background: #fffaf0; border-radius: 8px; font-size: 0.95em; color: #555; text-align: left; }
</style>
</head>
<body>
<h1>八字命盤</h1>

<div class="input-row">
    <input type="date" id="mydate" onchange="queryBaziFate()">
    <input type="time" id="mytime" value="00:00" onchange="queryBaziFate()">
    <select id="gender" onchange="queryBaziFate()">
        <option value="男">男</option>
        <option value="女">女</option>
    </select>
</div>

<div id="here" class="result-box"></div>

<script src="bazi-calculator.js"></script>
<script>
let baziData = null;

async function loadBaziData() {
    if (baziData) return baziData;
    try {
        const res = await fetch('bazi-data.json');
        baziData = await res.json();
        return baziData;
    } catch (e) { return null; }
}

async function queryBaziFate() {
    const dateInput = document.getElementById('mydate').value;
    const timeInput = document.getElementById('mytime').value || '00:00';
    if (!dateInput) return;

    const [yearStr, monthStr, dayStr] = dateInput.split('-');
    const year = parseInt(yearStr);
    const month = parseInt(monthStr);
    const day = parseInt(dayStr);
    const [hourStr, minStr] = timeInput.split(':');
    const hour = parseInt(hourStr);
    const minute = parseInt(minStr);

    const baziResult = window.getBazi(year, month, day, hour, minute);
    if (baziResult.error) {
        document.getElementById('here').innerHTML = `<p style="color:red;">${baziResult.error}</p>`;
        return;
    }
    // ====================== 夜子時 (23:00~23:59) 特殊處理 ======================
    if (hour === 23) {
        const dayStemIdx = stems.indexOf(baziResult.stems.day);
        const adjustedDayStemIdx = (dayStemIdx + 1) % 10;
        const adjustedDayStem = stems[adjustedDayStemIdx];

        const ziHourStemMap = {
            "甲": "甲", "己": "甲",
            "乙": "丙", "庚": "丙",
            "丙": "戊", "辛": "戊",
            "丁": "庚", "壬": "庚",
            "戊": "壬", "癸": "壬"
        };

        baziResult.stems.hour = ziHourStemMap[adjustedDayStem];
    }

    const data = await loadBaziData();
    if (!data) return;

    let terms = await window.getSolarTerms(year);
    if (terms.error) terms = { source: 'local' };

    // 節氣計算
    const currentHK = new Date(year, month - 1, day, hour, minute, 0);
    let currentIndex = -1;
    for (let i = 0; i < terms.length; i++) {
        const [y, m, d] = terms[i].date.split('-').map(Number);
        const [h, mi] = terms[i].time.split(':').map(Number);
        const termTime = new Date(y, m-1, d, h, mi);
        if (termTime.getTime() > currentHK.getTime()) { currentIndex = i - 1; break; }
    }
    if (currentIndex === -1) currentIndex = 23;
    const currentTerm = terms[currentIndex];

    let nextJie = null;
    for (let i = currentIndex + 1; i < terms.length; i++) if (terms[i].isJie) { nextJie = terms[i]; break; }
    if (!nextJie) { const ny = await window.getSolarTerms(year+1); nextJie = ny[0]; }
    let prevJie = null;
    for (let i = currentIndex; i >= 0; i--) if (terms[i].isJie) { prevJie = terms[i]; break; }
    if (!prevJie) { const py = await window.getSolarTerms(year-1); prevJie = py[22]; }

    const currentDateOnly = new Date(year, month - 1, day);
    const nextDateOnly = new Date(nextJie.date.split('-').map(Number)[0], nextJie.date.split('-').map(Number)[1]-1, nextJie.date.split('-').map(Number)[2]);
    const prevDateOnly = new Date(prevJie.date.split('-').map(Number)[0], prevJie.date.split('-').map(Number)[1]-1, prevJie.date.split('-').map(Number)[2]);

    const daysToNext = Math.floor((nextDateOnly - currentDateOnly) / 86400000) + 1;
    const daysToPrev = Math.floor((currentDateOnly - prevDateOnly) / 86400000) + 1;

    // ====================== 四柱八字表 ======================
    const branches = [baziResult.branches.hour, baziResult.branches.day, baziResult.branches.month, baziResult.branches.year];
    let pillarsHTML = `<table class="pillars"><tr><td>時</td><td>日</td><td>月</td><td>年</td></tr>`;
    pillarsHTML += `<tr>`;
    ["hour","day","month","year"].forEach(key => {
        const stem = baziResult.stems[key];
        const color = data.fiveColors[data.stemsElement[stem]];
        pillarsHTML += `<td><span style="color:${color}">${stem}</span></td>`;
    });
    pillarsHTML += `</tr><tr>`;
    branches.forEach(branch => {
        const color = data.fiveColors[data.branchesElement[branch]];
        pillarsHTML += `<td><span style="color:${color}">${branch}</span></td>`;
    });
    pillarsHTML += `</tr><tr>`;
    branches.forEach(branch => {
        const hiddens = data.hiddenStems[branch] || [];
        let html = hiddens.map(h => `<span class="hidden-stem" style="color:${data.fiveColors[data.stemsElement[h]]}">${h}</span>`).join('<br>');
        pillarsHTML += `<td>${html}</td>`;
    });
    pillarsHTML += `</tr>`;

    // ====================== 新增：納音五行行（垂直顯示） ======================
    pillarsHTML += `<tr>`;
    ["hour","day","month","year"].forEach(key => {
        const stem = baziResult.stems[key];
        const branch = baziResult.branches[key];
        const naYinKey = stem + branch;
        const naYin = data.naYin[naYinKey] || '-';
        
        // 垂直顯示，每個字一行，最後一個字（五行屬性）上色
        const chars = naYin.split('');
        let verticalHTML = chars.map((ch, i) => {
            if (i === chars.length - 1) {
                const color = data.fiveColors[ch] || '#555';
                return `<span style="color:${color}; font-weight:bold;">${ch}</span>`;
            }
            return ch;
        }).join('<br>');
        
        pillarsHTML += `<td style="font-size:0.85em; line-height:1.15; padding:6px 4px;">${verticalHTML}</td>`;
    });
    pillarsHTML += `</tr></table>`;

    // ====================== 十二神煞表（新增） ======================
    const dayStem = baziResult.stems.day;
    const dayBranch = data.stemToBranch[dayStem][0];
    const godsList = data.daily12Gods;

    let godsHTML = `<p style="margin:15px 0 8px; color:#666; font-size:1.05em;">十二神煞表</p>`;
    godsHTML += `<table class="gods-table"><tr><th>時</th><th>日</th><th>月</th><th>年</th></tr>`;

    // 第一行：天干對應神煞（日柱顯示「日元」）
    godsHTML += `<tr>`;
    ["hour","day","month","year"].forEach((key, idx) => {
        if (idx === 1) {
            godsHTML += `<td><strong>日元</strong></td>`;
        } else {
            const stem = baziResult.stems[key];
            const mappedBranch = data.stemToBranch[stem][0];
            const offset = (["子","丑","寅","卯","辰","巳","午","未","申","酉","戌","亥"].indexOf(mappedBranch) - ["子","丑","寅","卯","辰","巳","午","未","申","酉","戌","亥"].indexOf(dayBranch) + 12) % 12;
            godsHTML += `<td>${godsList[offset]}</td>`;
        }
    });
    godsHTML += `</tr>`;

    // 第二行：實際地支對應神煞
    godsHTML += `<tr>`;
    branches.forEach(branch => {
        const offset = (["子","丑","寅","卯","辰","巳","午","未","申","酉","戌","亥"].indexOf(branch) - ["子","丑","寅","卯","辰","巳","午","未","申","酉","戌","亥"].indexOf(dayBranch) + 12) % 12;
        godsHTML += `<td>${godsList[offset]}</td>`;
    });
    godsHTML += `</tr></table>`;

    // ====================== 大運表 ======================
    const birthYear = year;
    const yearStemIdx = stems.indexOf(baziResult.stems.year);
    const monthStemIdx = stems.indexOf(baziResult.stems.month);
    const monthBranchIdx = BranchesNamesshort.indexOf(baziResult.branches.month);
    const isYearYang = (yearStemIdx % 2 === 1);
    const isMale = document.getElementById('gender').value === '男';
    const forward = (isYearYang && isMale) || (!isYearYang && !isMale);
    const daysForLuck = forward ? daysToNext : daysToPrev;
    let luckStart = Math.floor(daysForLuck / 3);
    if (daysForLuck % 3 === 2) luckStart += 1;
    const luckStartYear = birthYear + luckStart - 1;   // 虛歲計算：1984年生、上運9歲 → 1992年

    let daYears = [], daStems = [], daBranches = [];
    let curStem = monthStemIdx;
    let curBranch = monthBranchIdx;
    for (let i = 0; i < 8; i++) {
        if (forward) {
            curStem = (curStem % 10) + 1;
            curBranch = (curBranch % 12) + 1;
        } else {
            curStem = curStem - 1; if (curStem < 1) curStem = 10;
            curBranch = curBranch - 1; if (curBranch < 1) curBranch = 12;
        }
        daStems.push(stems[curStem]);
        daBranches.push(BranchesNamesshort[curBranch]);
        daYears.push(luckStartYear + i * 10);
    }

    let daYunHTML = `<p style="margin:15px 0 8px; color:#666; font-size:1.05em;">大運表（${forward ? '順行' : '逆行'} • 上運 ${luckStartYear} 年）</p>`;
    daYunHTML += `<table class="daiyun"><tr>`;
    for (let i = 7; i >= 0; i--) daYunHTML += `<td>${daYears[i]}</td>`;
    daYunHTML += `</tr><tr>`;
    for (let i = 7; i >= 0; i--) daYunHTML += `<td><span style="color:${data.fiveColors[data.stemsElement[daStems[i]]]}">${daStems[i]}</span></td>`;
    daYunHTML += `</tr><tr>`;
    for (let i = 7; i >= 0; i--) daYunHTML += `<td><span style="color:${data.fiveColors[data.branchesElement[daBranches[i]]]}">${daBranches[i]}</span></td>`;
    daYunHTML += `</tr></table>`;

    const lunarLine = `${baziResult.lunar.full}　${baziResult.branches.hour}時`;

    const html = `
        <div class="lunar-line"><strong>農曆</strong>　${lunarLine}</div>
        ${pillarsHTML}
        ${godsHTML}
        <div class="current-term">現在節氣：${currentTerm.name}　<span style="font-size:0.7em; color:#666;">（${currentTerm.type}）</span></div>
        <div class="days-container">
            <div class="days-box">距離上一個節令<br><strong>${prevJie.name}</strong>　${prevJie.date}<br><span style="font-size:1.3em; color:#8B4513;">${daysToPrev} 天</span></div>
            <div class="days-box">距離下一個節令<br><strong>${nextJie.name}</strong>　${nextJie.date}<br><span style="font-size:1.3em; color:#8B4513;">${daysToNext} 天</span></div>
        </div>
        ${daYunHTML}
        <div class="source-info">✅ 節氣資料來源：Solarterm.json（香港天文台精準資料）</div>
    `;

    document.getElementById('here').innerHTML = html;
}

// 初始載入
const now = new Date();
const nowInHK = new Date(now.getTime() + 8 * 3600 * 1000);
document.getElementById('mydate').value = nowInHK.toISOString().split('T')[0];
document.getElementById('mytime').value = nowInHK.toISOString().split('T')[1].slice(0, 5);
document.getElementById('gender').value = '男';

queryBaziFate();
</script>
</body>
</html>
