<!DOCTYPE html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>八字命盤</title>
<style>
    body { text-align: center; font-family: sans-serif; background: #f9f7f0; padding: 20px; }
    h1 { color: #8B4513; margin-bottom: 15px; }
    .input-row { 
        display: flex; 
        justify-content: center; 
        gap: 12px; 
        flex-wrap: wrap; 
        margin-bottom: 25px; 
    }
    .input-row input, .input-row select { 
        padding: 12px; 
        font-size: 1.1em; 
        border: 2px solid #8B4513; 
        border-radius: 8px; 
        width: 220px; 
    }
    .result-box {
        max-width: 820px;
        margin: 20px auto;
        padding: 25px;
        background: white;
        border-radius: 12px;
        box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }
    .date-info {
        font-size: 1.4em;
        margin-bottom: 25px;
        background: #f9f7f0;
        padding: 15px;
        border-radius: 8px;
    }
    .lunar { color: #8B4513; font-weight: bold; }
    table { 
        margin: 25px auto; 
        border-collapse: collapse; 
        width: 100%;
        max-width: 520px;
        font-size: 1.35em;
    }
    td { 
        padding: 12px 10px; 
        border: 2px solid #D2B48C; 
        text-align: center;
    }
    .current-term { font-size: 1.5em; font-weight: bold; color: #8B4513; margin: 20px 0; }
    .days { 
        display: flex; 
        justify-content: center; 
        gap: 20px; 
        margin: 20px 0; 
        font-size: 1.15em; 
    }
    .days div {
        background: #fffaf0;
        padding: 10px 18px;
        border-radius: 8px;
        border: 2px solid #D2B48C;
        min-width: 140px;
    }
    .luck-table {
        margin: 30px auto;
        border-collapse: collapse;
        width: 100%;
        max-width: 820px;
        font-size: 1.1em;
    }
    .luck-table th, .luck-table td { 
        padding: 8px 6px; 
        border: 1px solid #D2B48C; 
        text-align: center;
    }
    .luck-table th { background: #f9f7f0; }
    .source-info {
        margin-top: 30px;
        padding: 12px;
        background: #fffaf0;
        border-radius: 8px;
        font-size: 0.95em;
        color: #555;
        text-align: left;
    }
</style>
</head>
<body>
<h1>八字命盤</h1>

<div class="input-row">
    <input type="date" id="mydate" onchange="queryBaziFate()">
    <input type="time" id="mytime" value="00:00" onchange="queryBaziFate()">
    <select id="gender" onchange="queryBaziFate()">
        <option value="男">男</option>
        <option value="女">女</option>
    </select>
</div>

<div id="here" class="result-box"></div>

<script src="bazi-calculator.js"></script>
<script>
const colorMap = {
    '甲':'green','乙':'green','寅':'green','卯':'green',
    '丙':'red','丁':'red','巳':'red','午':'red',
    '戊':'khaki','己':'khaki','丑':'khaki','辰':'khaki','未':'khaki','戌':'khaki',
    '庚':'gray','辛':'gray','申':'gray','酉':'gray',
    '壬':'black','癸':'black','子':'black','亥':'black'
};

async function queryBaziFate() {
    const dateInput = document.getElementById('mydate').value;
    const timeInput = document.getElementById('mytime').value || '00:00';
    const gender = document.getElementById('gender').value;

    if (!dateInput) return;

    const [yearStr, monthStr, dayStr] = dateInput.split('-');
    const year = parseInt(yearStr);
    const month = parseInt(monthStr);
    const day = parseInt(dayStr);
    const [hourStr, minStr] = timeInput.split(':');
    const hour = parseInt(hourStr);
    const minute = parseInt(minStr);

    const bazi = window.getBazi(year, month, day, hour, minute);
    if (bazi.error) {
        document.getElementById('here').innerHTML = `<p style="color:red;">${bazi.error}</p>`;
        return;
    }

    let terms = await window.getSolarTerms(year);

    // 計算現在節氣與距離天數
    const currentHK = new Date(year, month-1, day, hour, minute, 0);
    let currentIndex = -1;
    for (let i = 0; i < terms.length; i++) {
        const [y,m,d] = terms[i].date.split('-').map(Number);
        const [h,mi] = terms[i].time.split(':').map(Number);
        const termTime = new Date(y, m-1, d, h, mi);
        if (termTime.getTime() > currentHK.getTime()) { currentIndex = i-1; break; }
    }
    if (currentIndex === -1) currentIndex = 23;
    const currentTerm = terms[currentIndex];

    let nextJie = null;
    for (let i = currentIndex + 1; i < terms.length; i++) {
        if (terms[i].isJie) { nextJie = terms[i]; break; }
    }
    if (!nextJie) {
        const nextTerms = await window.getSolarTerms(year + 1);
        nextJie = nextTerms[0];
    }

    let prevJie = null;
    for (let i = currentIndex; i >= 0; i--) {
        if (terms[i].isJie) { prevJie = terms[i]; break; }
    }
    if (!prevJie) {
        const prevTerms = await window.getSolarTerms(year - 1);
        prevJie = prevTerms[22];
    }

    const currentDateOnly = new Date(year, month-1, day);
    const nextDateOnly = new Date(nextJie.date.split('-').map(Number)[0], nextJie.date.split('-').map(Number)[1]-1, nextJie.date.split('-').map(Number)[2]);
    const prevDateOnly = new Date(prevJie.date.split('-').map(Number)[0], prevJie.date.split('-').map(Number)[1]-1, prevJie.date.split('-').map(Number)[2]);

    const daysToNext = Math.floor((nextDateOnly - currentDateOnly) / 86400000) + 1;
    const daysToPrev = Math.floor((currentDateOnly - prevDateOnly) / 86400000) + 1;

    // ====================== 大運計算 ======================
    const yearStem = bazi.stems.year;
    const stemIdx = ["","甲","乙","丙","丁","戊","己","庚","辛","壬","癸"].indexOf(yearStem);
    const isYangStem = (stemIdx % 2 === 1);   // 甲丙戊庚壬為陽

    const isForward = (gender === '男') ? isYangStem : !isYangStem;

    const daysForLuck = isForward ? daysToNext : daysToPrev;
    let startAge = Math.floor(daysForLuck / 3);
    if (daysForLuck % 3 >= 2) startAge += 1;

    const firstLuckYear = year + startAge;

    // 月柱索引
    const monthStemIdx = ["","甲","乙","丙","丁","戊","己","庚","辛","壬","癸"].indexOf(bazi.stems.month);
    const monthBranchIdx = ["","子","丑","寅","卯","辰","巳","午","未","申","酉","戌","亥"].indexOf(bazi.branches.month);

    let lucks = [];
    for (let k = 0; k < 8; k++) {
        const step = isForward ? (k + 1) : -(k + 1);
        const sIdx = ((monthStemIdx - 1 + step + 1000) % 10) + 1;
        const bIdx = ((monthBranchIdx - 1 + step + 1000) % 12) + 1;
        lucks.push({
            year: firstLuckYear + k * 10,
            stem: ["","甲","乙","丙","丁","戊","己","庚","辛","壬","癸"][sIdx],
            branch: ["","子","丑","寅","卯","辰","巳","午","未","申","酉","戌","亥"][bIdx]
        });
    }

    // 由右至左顯示 → 把陣列反轉
    lucks.reverse();

    // 來源說明
    const sourceText = terms.source === 'hko' 
        ? '✅ 節氣資料來源：Solarterm.json（香港天文台）' 
        : '📌 節氣資料來源：本地標準公式';

    const html = `
        <div class="date-info">
            <strong class="lunar">農曆</strong><br>
            ${bazi.lunar.full}　${bazi.branches.hour}時
        </div>

        <table>
            <tr><td>時</td><td>日</td><td>月</td><td>年</td></tr>
            <tr>
                <td><span style="color:${colorMap[bazi.stems.hour]||'black'}">${bazi.stems.hour}</span></td>
                <td><span style="color:${colorMap[bazi.stems.day]||'black'}">${bazi.stems.day}</span></td>
                <td><span style="color:${colorMap[bazi.stems.month]||'black'}">${bazi.stems.month}</span></td>
                <td><span style="color:${colorMap[bazi.stems.year]||'black'}">${bazi.stems.year}</span></td>
            </tr>
            <tr>
                <td><span style="color:${colorMap[bazi.branches.hour]||'black'}">${bazi.branches.hour}</span></td>
                <td><span style="color:${colorMap[bazi.branches.day]||'black'}">${bazi.branches.day}</span></td>
                <td><span style="color:${colorMap[bazi.branches.month]||'black'}">${bazi.branches.month}</span></td>
                <td><span style="color:${colorMap[bazi.branches.year]||'black'}">${bazi.branches.year}</span></td>
            </tr>
        </table>

        <div class="current-term">
            現在節氣：${currentTerm.name}　<span style="font-size:0.7em;color:#666;">（${currentTerm.type}）</span>
        </div>

        <div class="days">
            <div>距離上一個節令<br><strong>${prevJie.name}</strong>　${prevJie.date}<br><span style="font-size:1.35em;color:#8B4513;">${daysToPrev} 天</span></div>
            <div>距離下一個節令<br><strong>${nextJie.name}</strong>　${nextJie.date}<br><span style="font-size:1.35em;color:#8B4513;">${daysToNext} 天</span></div>
        </div>

        <p style="margin:20px 0 8px; color:#666;">大運表（${isForward ? '順行' : '逆行'}）</p>
        <table class="luck-table">
            <tr>
                ${lucks.map(l => `<td>${l.year}</td>`).join('')}
            </tr>
            <tr>
                ${lucks.map(l => `<td><span style="color:${colorMap[l.stem]||'black'}">${l.stem}</span></td>`).join('')}
            </tr>
            <tr>
                ${lucks.map(l => `<td><span style="color:${colorMap[l.branch]||'black'}">${l.branch}</span></td>`).join('')}
            </tr>
        </table>

        <div class="source-info">${sourceText}</div>
    `;

    document.getElementById('here').innerHTML = html;
}

// 初始載入現在香港時間
const now = new Date();
const nowInHK = new Date(now.getTime() + 8 * 3600 * 1000);
document.getElementById('mydate').value = nowInHK.toISOString().split('T')[0];
document.getElementById('mytime').value = nowInHK.toISOString().split('T')[1].slice(0, 5);
queryBaziFate();
</script>
</body>
</html>
