<!DOCTYPE html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>八字命盤</title>
<style>
    body { text-align: center; font-family: sans-serif; background: #f9f7f0; padding: 20px; }
    h1 { color: #8B4513; margin-bottom: 15px; }
    .input-row { display: flex; flex-wrap: wrap; justify-content: center; gap: 12px; margin-bottom: 25px; }
    .input-row input, .input-row select { padding: 12px; font-size: 1.1em; border: 2px solid #8B4513; border-radius: 8px; width: 220px; }
    .result-box { max-width: 780px; margin: 0 auto; padding: 25px; background: white; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
    .lunar-line { font-size: 1.45em; margin-bottom: 25px; color: #8B4513; font-weight: bold; }
    table.pillars { margin: 20px auto; border-collapse: collapse; width: 100%; max-width: 520px; font-size: 1.35em; }
    .pillars td { padding: 8px 6px; border: 2px solid #D2B48C; text-align: center; vertical-align: middle; }
    .hidden-stem { font-size: 0.85em; line-height: 1.1; color: #555; }
    .gods-table { margin: 25px auto 0; border-collapse: collapse; width: 100%; max-width: 520px; font-size: 1.1em; }
    .gods-table th, .gods-table td { padding: 10px 8px; border: 1px solid #D2B48C; text-align: center; }
    .gods-table th { background: #f9f7f0; }
    .current-term { font-size: 1.5em; font-weight: bold; color: #8B4513; margin: 25px 0 15px; }
    .days-container { display: flex; justify-content: center; gap: 20px; margin: 15px 0 25px; }
    .days-box { background: #fffaf0; padding: 12px 20px; border-radius: 8px; border: 2px solid #D2B48C; width: 210px; font-size: 1.05em; }
    .days-box strong { font-size: 1.35em; color: #8B4513; }
    table.daiyun { margin: 30px auto 0; border-collapse: collapse; width: 100%; max-width: 680px; font-size: 1.1em; }
    .daiyun th, .daiyun td { padding: 10px 6px; border: 1px solid #D2B48C; text-align: center; }
    .daiyun th { background: #f9f7f0; }
    .source-info { margin-top: 30px; padding: 12px; background: #fffaf0; border-radius: 8px; font-size: 0.95em; color: #555; text-align: left; }
    .error { color: red; margin: 20px 0; font-size: 1.1em; }
</style>
</head>
<body>
<h1>八字命盤</h1>

<div class="input-row">
    <input type="date" id="mydate" onchange="queryBaziFate()">
    <input type="time" id="mytime" value="00:00" onchange="queryBaziFate()">
    <select id="gender" onchange="queryBaziFate()">
        <option value="男">男</option>
        <option value="女">女</option>
    </select>
</div>

<div id="here" class="result-box"></div>

<script src="bazi-calculator.js"></script>
<script>
let baziData = null;

async function loadBaziData() {
    try {
        const res = await fetch('bazi-data.json');
        if (!res.ok) throw new Error('檔案不存在');
        baziData = await res.json();
        return baziData;
    } catch (e) {
        console.error("無法載入 bazi-data.json");
        document.getElementById('here').innerHTML = `
            <p class="error">⚠️ 無法載入 bazi-data.json</p>
            <p style="color:#666;">請確認以下檔案已放在同一資料夾：<br>
            • bazi-data.json<br>
            • bazi-calculator.js<br>
            • Solarterm.json<br>
            • bazi-fate.html</p>`;
        return null;
    }
}

async function queryBaziFate() {
    const dateInput = document.getElementById('mydate').value;
    const timeInput = document.getElementById('mytime').value || '00:00';
    if (!dateInput) return;

    const [yearStr, monthStr, dayStr] = dateInput.split('-');
    const year = parseInt(yearStr);
    const month = parseInt(monthStr);
    const day = parseInt(dayStr);
    const [hourStr, minStr] = timeInput.split(':');
    const hour = parseInt(hourStr);
    const minute = parseInt(minStr);

    const baziResult = window.getBazi(year, month, day, hour, minute);
    if (baziResult.error) {
        document.getElementById('here').innerHTML = `<p style="color:red;">${baziResult.error}</p>`;
        return;
    }

    const data = await loadBaziData();
    if (!data) return;   // 已顯示錯誤訊息

    // ...（後面程式碼與上次完全相同，請保留你原本的 queryBaziFate 其餘部分）...
    // （為了節省篇幅，這裡省略後續程式碼，你只需把上面的 loadBaziData 替換進去即可）

    // 以下是簡化版示意（實際請使用你上一個版本的完整 queryBaziFate 內容）
    let terms = await window.getSolarTerms(year);
    if (terms.error) terms = { source: 'local' };

    // ... 其餘計算與顯示保持不變 ...
}

const now = new Date();
const nowInHK = new Date(now.getTime() + 8 * 3600 * 1000);
document.getElementById('mydate').value = nowInHK.toISOString().split('T')[0];
document.getElementById('mytime').value = nowInHK.toISOString().split('T')[1].slice(0, 5);
document.getElementById('gender').value = '男';

queryBaziFate();
</script>
</body>
</html>
