<!DOCTYPE html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>八字命盤</title>
<style>
    body { 
        text-align: center; 
        font-family: sans-serif; 
        background: #f9f7f0;
        padding: 20px;
    }
    h1 { color: #8B4513; margin-bottom: 15px; }
    
    .input-row {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
        margin-bottom: 25px;
    }
    .input-row input, .input-row select {
        padding: 12px;
        font-size: 1.1em;
        border: 2px solid #8B4513;
        border-radius: 8px;
        width: 220px;
    }
    .result-box {
        max-width: 780px;
        margin: 0 auto;
        padding: 25px;
        background: white;
        border-radius: 12px;
        box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }
    .lunar-line {
        font-size: 1.45em;
        margin-bottom: 25px;
        color: #8B4513;
        font-weight: bold;
    }
    table.pillars { 
        margin: 20px auto; 
        border-collapse: collapse; 
        width: 100%;
        max-width: 520px;
        font-size: 1.35em;
    }
    .pillars td { 
        padding: 10px 8px; 
        border: 2px solid #D2B48C; 
        text-align: center;
        vertical-align: middle;
    }
    .current-term {
        font-size: 1.5em;
        font-weight: bold;
        color: #8B4513;
        margin: 25px 0 15px;
    }
    .days-container {
        display: flex;
        justify-content: center;
        gap: 20px;
        margin: 15px 0 25px;
    }
    .days-box {
        background: #fffaf0;
        padding: 12px 20px;
        border-radius: 8px;
        border: 2px solid #D2B48C;
        width: 210px;
        font-size: 1.05em;
    }
    .days-box strong { font-size: 1.35em; color: #8B4513; }
    
    /* 大運表：改為 3行 x 8列，由右至左 */
    table.daiyun {
        margin: 30px auto 0;
        border-collapse: collapse;
        width: 100%;
        max-width: 680px;
        font-size: 1.1em;
    }
    .daiyun th, .daiyun td {
        padding: 10px 6px;
        border: 1px solid #D2B48C;
        text-align: center;
    }
    .daiyun th { background: #f9f7f0; }
    
    .source-info {
        margin-top: 30px;
        padding: 12px;
        background: #fffaf0;
        border-radius: 8px;
        font-size: 0.95em;
        color: #555;
        text-align: left;
    }
</style>
</head>
<body>
<h1>八字命盤</h1>

<div class="input-row">
    <input type="date" id="mydate" onchange="queryBaziFate()">
    <input type="time" id="mytime" value="00:00" onchange="queryBaziFate()">
    <select id="gender" onchange="queryBaziFate()">
        <option value="男">男</option>
        <option value="女">女</option>
    </select>
</div>

<div id="here" class="result-box"></div>

<script src="bazi-calculator.js"></script>
<script>
const colorMap = {
    '甲': 'green', '乙': 'green', '寅': 'green', '卯': 'green',
    '丙': 'red',   '丁': 'red',   '巳': 'red',   '午': 'red',
    '戊': 'khaki', '己': 'khaki', '丑': 'khaki', '辰': 'khaki', '未': 'khaki', '戌': 'khaki',
    '庚': 'gray',  '辛': 'gray',  '申': 'gray',  '酉': 'gray',
    '壬': 'black', '癸': 'black', '子': 'black', '亥': 'black'
};

// 支藏（藏干）
const hiddenStemsMap = {
    "子": "癸",
    "丑": "己癸辛",
    "寅": "甲丙戊",
    "卯": "乙",
    "辰": "戊乙癸",
    "巳": "丙庚戊",
    "午": "丁己",
    "未": "己丁乙",
    "申": "庚壬戊",
    "酉": "辛",
    "戌": "戊辛丁",
    "亥": "壬甲"
};

async function queryBaziFate() {
    const dateInput = document.getElementById('mydate').value;
    const timeInput = document.getElementById('mytime').value || '00:00';
    if (!dateInput) return;

    const [yearStr, monthStr, dayStr] = dateInput.split('-');
    const year = parseInt(yearStr);
    const month = parseInt(monthStr);
    const day = parseInt(dayStr);
    const [hourStr, minStr] = timeInput.split(':');
    const hour = parseInt(hourStr);
    const minute = parseInt(minStr);

    const baziResult = window.getBazi(year, month, day, hour, minute);
    if (baziResult.error) {
        document.getElementById('here').innerHTML = `<p style="color:red;">${baziResult.error}</p>`;
        return;
    }

    let terms = await window.getSolarTerms(year);
    if (terms.error) terms = { source: 'local' };

    // 節氣計算（與之前相同）
    const currentHK = new Date(year, month - 1, day, hour, minute, 0);
    let currentIndex = -1;
    for (let i = 0; i < terms.length; i++) {
        const [y, m, d] = terms[i].date.split('-').map(Number);
        const [h, mi] = terms[i].time.split(':').map(Number);
        const termTime = new Date(y, m-1, d, h, mi);
        if (termTime.getTime() > currentHK.getTime()) {
            currentIndex = i - 1;
            break;
        }
    }
    if (currentIndex === -1) currentIndex = 23;
    const currentTerm = terms[currentIndex];

    let nextJie = null;
    for (let i = currentIndex + 1; i < terms.length; i++) {
        if (terms[i].isJie) { nextJie = terms[i]; break; }
    }
    if (!nextJie) {
        const nextYear = await window.getSolarTerms(year + 1);
        nextJie = nextYear[0];
    }
    let prevJie = null;
    for (let i = currentIndex; i >= 0; i--) {
        if (terms[i].isJie) { prevJie = terms[i]; break; }
    }
    if (!prevJie) {
        const prevYear = await window.getSolarTerms(year - 1);
        prevJie = prevYear[22];
    }

    const currentDateOnly = new Date(year, month - 1, day);
    const nextDateOnly = new Date(nextJie.date.split('-').map(Number)[0], nextJie.date.split('-').map(Number)[1]-1, nextJie.date.split('-').map(Number)[2]);
    const prevDateOnly = new Date(prevJie.date.split('-').map(Number)[0], prevJie.date.split('-').map(Number)[1]-1, prevJie.date.split('-').map(Number)[2]);

    const daysToNext = Math.floor((nextDateOnly - currentDateOnly) / 86400000) + 1;
    const daysToPrev = Math.floor((currentDateOnly - prevDateOnly) / 86400000) + 1;

    // ====================== 大運（與之前相同） ======================
    const birthYear = year;
    const yearStemIdx = stems.indexOf(baziResult.stems.year);
    const monthStemIdx = stems.indexOf(baziResult.stems.month);
    const monthBranchIdx = BranchesNamesshort.indexOf(baziResult.branches.month);
    const isYearYang = (yearStemIdx % 2 === 1);
    const isMale = document.getElementById('gender').value === '男';
    const forward = (isYearYang && isMale) || (!isYearYang && !isMale);
    const daysForLuck = forward ? daysToNext : daysToPrev;
    let luckStart = Math.floor(daysForLuck / 3);
    if (daysForLuck % 3 === 2) luckStart += 1;

    let daYears = [], daStems = [], daBranches = [];
    let curStem = monthStemIdx;
    let curBranch = monthBranchIdx;
    for (let i = 0; i < 8; i++) {
        if (forward) {
            curStem = (curStem % 10) + 1;
            curBranch = (curBranch % 12) + 1;
        } else {
            curStem = curStem - 1; if (curStem < 1) curStem = 10;
            curBranch = curBranch - 1; if (curBranch < 1) curBranch = 12;
        }
        daStems.push(stems[curStem]);
        daBranches.push(BranchesNamesshort[curBranch]);
        daYears.push(birthYear + luckStart + i * 10);
    }

    // ====================== 最終 HTML ======================
    const lunarLine = `${baziResult.lunar.full}　${baziResult.branches.hour}時`;

    let pillarsHTML = `
        <table class="pillars">
            <tr><td>時</td><td>日</td><td>月</td><td>年</td></tr>
            <tr>
                <td><span style="color:${colorMap[baziResult.stems.hour]||'black'}">${baziResult.stems.hour}</span></td>
                <td><span style="color:${colorMap[baziResult.stems.day]||'black'}">${baziResult.stems.day}</span></td>
                <td><span style="color:${colorMap[baziResult.stems.month]||'black'}">${baziResult.stems.month}</span></td>
                <td><span style="color:${colorMap[baziResult.stems.year]||'black'}">${baziResult.stems.year}</span></td>
            </tr>
            <tr>
                <td><span style="color:${colorMap[baziResult.branches.hour]||'black'}">${baziResult.branches.hour}</span></td>
                <td><span style="color:${colorMap[baziResult.branches.day]||'black'}">${baziResult.branches.day}</span></td>
                <td><span style="color:${colorMap[baziResult.branches.month]||'black'}">${baziResult.branches.month}</span></td>
                <td><span style="color:${colorMap[baziResult.branches.year]||'black'}">${baziResult.branches.year}</span></td>
            </tr>
            <tr>
                <td><span style="color:#666">${hiddenStemsMap[baziResult.branches.hour]||''}</span></td>
                <td><span style="color:#666">${hiddenStemsMap[baziResult.branches.day]||''}</span></td>
                <td><span style="color:#666">${hiddenStemsMap[baziResult.branches.month]||''}</span></td>
                <td><span style="color:#666">${hiddenStemsMap[baziResult.branches.year]||''}</span></td>
            </tr>
        </table>`;

    // 陰陽五行結構（簡單顯示四柱五行）
    const fiveElements = {
        "甲乙": "木", "丙丁": "火", "戊己": "土", "庚辛": "金", "壬癸": "水"
    };
    const getElement = (stem) => {
        for (let key in fiveElements) if (key.includes(stem)) return fiveElements[key];
        return "—";
    };

    let fiveHTML = `
        <p style="margin:10px 0 5px; color:#666; font-size:1.05em;">陰陽五行結構</p>
        <table class="pillars" style="max-width:520px; font-size:1.1em;">
            <tr>
                <td>時柱</td><td>日柱</td><td>月柱</td><td>年柱</td>
            </tr>
            <tr>
                <td>${getElement(baziResult.stems.hour)}</td>
                <td>${getElement(baziResult.stems.day)}</td>
                <td>${getElement(baziResult.stems.month)}</td>
                <td>${getElement(baziResult.stems.year)}</td>
            </tr>
        </table>`;

    // 大運表（3行 × 8列，由右至左）
    let daYunHTML = `<p style="margin:15px 0 8px; color:#666; font-size:1.05em;">大運表（${forward ? '順行' : '逆行'} • 上運 ${luckStart} 歲）</p>`;
    daYunHTML += `<table class="daiyun"><tr>`;
    // 年份行（由右至左）
    for (let i = 7; i >= 0; i--) daYunHTML += `<td>${daYears[i]}</td>`;
    daYunHTML += `</tr><tr>`;
    // 天干行
    for (let i = 7; i >= 0; i--) daYunHTML += `<td><span style="color:${colorMap[daStems[i]]||'black'}">${daStems[i]}</span></td>`;
    daYunHTML += `</tr><tr>`;
    // 地支行
    for (let i = 7; i >= 0; i--) daYunHTML += `<td><span style="color:${colorMap[daBranches[i]]||'black'}">${daBranches[i]}</span></td>`;
    daYunHTML += `</tr></table>`;

    const sourceText = terms.source === 'hko' 
        ? '✅ 節氣資料來源：Solarterm.json（香港天文台精準資料）' 
        : '📌 節氣資料來源：本地標準公式';

    const html = `
        <div class="lunar-line">
            <strong>農曆</strong>　${lunarLine}
        </div>

        ${pillarsHTML}

        ${fiveHTML}

        <div class="current-term">
            現在節氣：${currentTerm.name}　<span style="font-size:0.7em; color:#666;">（${currentTerm.type}）</span>
        </div>

        <div class="days-container">
            <div class="days-box">
                距離上一個節令<br>
                <strong>${prevJie.name}</strong>　${prevJie.date}<br>
                <span style="font-size:1.3em; color:#8B4513;">${daysToPrev} 天</span>
            </div>
            <div class="days-box">
                距離下一個節令<br>
                <strong>${nextJie.name}</strong>　${nextJie.date}<br>
                <span style="font-size:1.3em; color:#8B4513;">${daysToNext} 天</span>
            </div>
        </div>

        ${daYunHTML}

        <div class="source-info">
            ${sourceText}
        </div>
    `;

    document.getElementById('here').innerHTML = html;
}

// 初始載入
const now = new Date();
const nowInHK = new Date(now.getTime() + 8 * 3600 * 1000);
document.getElementById('mydate').value = nowInHK.toISOString().split('T')[0];
document.getElementById('mytime').value = nowInHK.toISOString().split('T')[1].slice(0, 5);
document.getElementById('gender').value = '男';

queryBaziFate();
</script>
</body>
</html>
