<!DOCTYPE html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>八字命盤</title>
<style>
    body { 
        text-align: center; 
        font-family: sans-serif; 
        background: #f9f7f0;
        padding: 20px;
    }
    h1 { color: #8B4513; margin-bottom: 15px; }
    
    .input-row {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
        margin-bottom: 25px;
    }
    .input-row input, .input-row select {
        padding: 12px;
        font-size: 1.1em;
        border: 2px solid #8B4513;
        border-radius: 8px;
        width: 220px;
    }
    .result-box {
        max-width: 780px;
        margin: 0 auto;
        padding: 25px;
        background: white;
        border-radius: 12px;
        box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }
    .lunar-line {
        font-size: 1.45em;
        margin-bottom: 25px;
        color: #8B4513;
        font-weight: bold;
    }
    table.pillars { 
        margin: 20px auto; 
        border-collapse: collapse; 
        width: 100%;
        max-width: 520px;
        font-size: 1.35em;
    }
    .pillars td { 
        padding: 10px 8px; 
        border: 2px solid #D2B48C; 
        text-align: center;
        vertical-align: middle;
    }
    .hidden-stems {
        font-size: 0.85em !important;
        line-height: 1.1;
        color: #555;
    }
    .current-term {
        font-size: 1.5em;
        font-weight: bold;
        color: #8B4513;
        margin: 25px 0 15px;
    }
    .days-container {
        display: flex;
        justify-content: center;
        gap: 20px;
        margin: 15px 0 25px;
    }
    .days-box {
        background: #fffaf0;
        padding: 12px 20px;
        border-radius: 8px;
        border: 2px solid #D2B48C;
        width: 210px;
        font-size: 1.05em;
    }
    .days-box strong { font-size: 1.35em; color: #8B4513; }
    
    table.five-elements {
        margin: 25px auto 0;
        border-collapse: collapse;
        width: 100%;
        max-width: 520px;
        font-size: 1.15em;
    }
    .five-elements td { 
        padding: 10px 8px; 
        border: 2px solid #D2B48C; 
        text-align: center;
        vertical-align: middle;
    }
    .five-elements .element-wood { color: green; }
    .five-elements .element-fire { color: red; }
    .five-elements .element-earth { color: #c9a22b; }
    .five-elements .element-metal { color: gray; }
    .five-elements .element-water { color: black; }

    table.daiyun {
        margin: 30px auto 0;
        border-collapse: collapse;
        width: 100%;
        max-width: 680px;
        font-size: 1.1em;
    }
    .daiyun th, .daiyun td {
        padding: 10px 6px;
        border: 1px solid #D2B48C;
        text-align: center;
    }
    .daiyun th { background: #f9f7f0; }
    
    .source-info {
        margin-top: 30px;
        padding: 12px;
        background: #fffaf0;
        border-radius: 8px;
        font-size: 0.95em;
        color: #555;
        text-align: left;
    }
</style>
</head>
<body>
<h1>八字命盤</h1>

<div class="input-row">
    <input type="date" id="mydate" onchange="queryBaziFate()">
    <input type="time" id="mytime" value="00:00" onchange="queryBaziFate()">
    <select id="gender" onchange="queryBaziFate()">
        <option value="男">男</option>
        <option value="女">女</option>
    </select>
</div>

<div id="here" class="result-box"></div>

<script src="bazi-calculator.js"></script>
<script>
const colorMap = {
    '甲': 'green', '乙': 'green', '寅': 'green', '卯': 'green',
    '丙': 'red',   '丁': 'red',   '巳': 'red',   '午': 'red',
    '戊': 'khaki', '己': 'khaki', '丑': 'khaki', '辰': 'khaki', '未': 'khaki', '戌': 'khaki',
    '庚': 'gray',  '辛': 'gray',  '申': 'gray',  '酉': 'gray',
    '壬': 'black', '癸': 'black', '子': 'black', '亥': 'black'
};

// 支藏
const hiddenStemsMap = {
    "子": "癸",
    "丑": "己癸辛",
    "寅": "甲丙戊",
    "卯": "乙",
    "辰": "戊乙癸",
    "巳": "丙庚戊",
    "午": "丁己",
    "未": "己丁乙",
    "申": "庚壬戊",
    "酉": "辛",
    "戌": "戊辛丁",
    "亥": "壬甲"
};

// 地支五行
const branchElementMap = {
    "寅":"木","卯":"木",
    "巳":"火","午":"火",
    "辰":"土","戌":"土","丑":"土","未":"土",
    "申":"金","酉":"金",
    "子":"水","亥":"水"
};

// 納音五行對照表（完整 60 甲子）
const naYinMap = {
    "甲子":"海中金","乙丑":"海中金",
    "丙寅":"爐中火","丁卯":"爐中火",
    "戊辰":"大林木","己巳":"大林木",
    "庚午":"路旁土","辛未":"路旁土",
    "壬申":"劍鋒金","癸酉":"劍鋒金",
    "甲戌":"山頭火","乙亥":"山頭火",
    "丙子":"澗下水","丁丑":"澗下水",
    "戊寅":"城頭土","己卯":"城頭土",
    "庚辰":"白蠟金","辛巳":"白蠟金",
    "壬午":"楊柳木","癸未":"楊柳木",
    "甲申":"泉中水","乙酉":"泉中水",
    "丙戌":"屋上土","丁亥":"屋上土",
    "戊子":"霹靂火","己丑":"霹靂火",
    "庚寅":"松柏木","辛卯":"松柏木",
    "壬辰":"長流水","癸巳":"長流水",
    "甲午":"沙中金","乙未":"沙中金",
    "丙申":"山下火","丁酉":"山下火",
    "戊戌":"平地木","己亥":"平地木",
    "庚子":"壁上土","辛丑":"壁上土",
    "壬寅":"金箔金","癸卯":"金箔金",
    "甲辰":"覆燈火","乙巳":"覆燈火",
    "丙午":"天河水","丁未":"天河水",
    "戊申":"大驛土","己酉":"大驛土",
    "庚戌":"釵釧金","辛亥":"釵釧金",
    "壬子":"桑柘木","癸丑":"桑柘木",
    "甲寅":"大溪水","乙卯":"大溪水",
    "丙辰":"沙中土","丁巳":"沙中土",
    "戊午":"天上火","己未":"天上火",
    "庚申":"石榴木","辛酉":"石榴木",
    "壬戌":"大海水","癸亥":"大海水"
};

async function queryBaziFate() {
    const dateInput = document.getElementById('mydate').value;
    const timeInput = document.getElementById('mytime').value || '00:00';
    if (!dateInput) return;

    const [yearStr, monthStr, dayStr] = dateInput.split('-');
    const year = parseInt(yearStr);
    const month = parseInt(monthStr);
    const day = parseInt(dayStr);
    const [hourStr, minStr] = timeInput.split(':');
    const hour = parseInt(hourStr);
    const minute = parseInt(minStr);

    const baziResult = window.getBazi(year, month, day, hour, minute);
    if (baziResult.error) {
        document.getElementById('here').innerHTML = `<p style="color:red;">${baziResult.error}</p>`;
        return;
    }

    let terms = await window.getSolarTerms(year);
    if (terms.error) terms = { source: 'local' };

    // 節氣計算（略，與之前相同）
    const currentHK = new Date(year, month - 1, day, hour, minute, 0);
    let currentIndex = -1;
    for (let i = 0; i < terms.length; i++) {
        const [y, m, d] = terms[i].date.split('-').map(Number);
        const [h, mi] = terms[i].time.split(':').map(Number);
        const termTime = new Date(y, m-1, d, h, mi);
        if (termTime.getTime() > currentHK.getTime()) { currentIndex = i - 1; break; }
    }
    if (currentIndex === -1) currentIndex = 23;
    const currentTerm = terms[currentIndex];

    let nextJie = null;
    for (let i = currentIndex + 1; i < terms.length; i++) {
        if (terms[i].isJie) { nextJie = terms[i]; break; }
    }
    if (!nextJie) {
        const nextYear = await window.getSolarTerms(year + 1);
        nextJie = nextYear[0];
    }
    let prevJie = null;
    for (let i = currentIndex; i >= 0; i--) {
        if (terms[i].isJie) { prevJie = terms[i]; break; }
    }
    if (!prevJie) {
        const prevYear = await window.getSolarTerms(year - 1);
        prevJie = prevYear[22];
    }

    const currentDateOnly = new Date(year, month - 1, day);
    const nextDateOnly = new Date(nextJie.date.split('-').map(Number)[0], nextJie.date.split('-').map(Number)[1]-1, nextJie.date.split('-').map(Number)[2]);
    const prevDateOnly = new Date(prevJie.date.split('-').map(Number)[0], prevJie.date.split('-').map(Number)[1]-1, prevJie.date.split('-').map(Number)[2]);

    const daysToNext = Math.floor((nextDateOnly - currentDateOnly) / 86400000) + 1;
    const daysToPrev = Math.floor((currentDateOnly - prevDateOnly) / 86400000) + 1;

    // ====================== 四柱八字表（新增支藏垂直顯示） ======================
    const pillarsHTML = `
        <table class="pillars">
            <tr><td>時</td><td>日</td><td>月</td><td>年</td></tr>
            <tr>
                <td><span style="color:${colorMap[baziResult.stems.hour]||'black'}">${baziResult.stems.hour}</span></td>
                <td><span style="color:${colorMap[baziResult.stems.day]||'black'}">${baziResult.stems.day}</span></td>
                <td><span style="color:${colorMap[baziResult.stems.month]||'black'}">${baziResult.stems.month}</span></td>
                <td><span style="color:${colorMap[baziResult.stems.year]||'black'}">${baziResult.stems.year}</span></td>
            </tr>
            <tr>
                <td><span style="color:${colorMap[baziResult.branches.hour]||'black'}">${baziResult.branches.hour}</span></td>
                <td><span style="color:${colorMap[baziResult.branches.day]||'black'}">${baziResult.branches.day}</span></td>
                <td><span style="color:${colorMap[baziResult.branches.month]||'black'}">${baziResult.branches.month}</span></td>
                <td><span style="color:${colorMap[baziResult.branches.year]||'black'}">${baziResult.branches.year}</span></td>
            </tr>
            <tr>
                <td class="hidden-stems">${(hiddenStemsMap[baziResult.branches.hour]||'').split('').join('<br>')}</td>
                <td class="hidden-stems">${(hiddenStemsMap[baziResult.branches.day]||'').split('').join('<br>')}</td>
                <td class="hidden-stems">${(hiddenStemsMap[baziResult.branches.month]||'').split('').join('<br>')}</td>
                <td class="hidden-stems">${(hiddenStemsMap[baziResult.branches.year]||'').split('').join('<br>')}</td>
            </tr>
        </table>`;

    // ====================== 陰陽五行結構（新版） ======================
    const getElementColorClass = (el) => {
        if (el === "木") return "element-wood";
        if (el === "火") return "element-fire";
        if (el === "土") return "element-earth";
        if (el === "金") return "element-metal";
        if (el === "水") return "element-water";
        return "";
    };

    const branchEl = (b) => branchElementMap[b] || "—";
    const naYin = (stem, branch) => naYinMap[stem + branch] || "—";

    const fiveHTML = `
        <p style="margin:10px 0 8px; color:#666; font-size:1.05em;">陰陽五行結構</p>
        <table class="five-elements">
            <tr>
                <td class="${getElementColorClass(branchEl(baziResult.branches.hour))}">${branchEl(baziResult.branches.hour)}</td>
                <td class="${getElementColorClass(branchEl(baziResult.branches.day))}">${branchEl(baziResult.branches.day)}</td>
                <td class="${getElementColorClass(branchEl(baziResult.branches.month))}">${branchEl(baziResult.branches.month)}</td>
                <td class="${getElementColorClass(branchEl(baziResult.branches.year))}">${branchEl(baziResult.branches.year)}</td>
            </tr>
            <tr>
                <td class="${getElementColorClass(naYin(baziResult.stems.hour, baziResult.branches.hour).slice(-1))}">${naYin(baziResult.stems.hour, baziResult.branches.hour)}</td>
                <td class="${getElementColorClass(naYin(baziResult.stems.day, baziResult.branches.day).slice(-1))}">${naYin(baziResult.stems.day, baziResult.branches.day)}</td>
                <td class="${getElementColorClass(naYin(baziResult.stems.month, baziResult.branches.month).slice(-1))}">${naYin(baziResult.stems.month, baziResult.branches.month)}</td>
                <td class="${getElementColorClass(naYin(baziResult.stems.year, baziResult.branches.year).slice(-1))}">${naYin(baziResult.stems.year, baziResult.branches.year)}</td>
            </tr>
        </table>`;

    // ====================== 大運表（保持 3×8 右至左） ======================
    // （與上一版完全相同，略）

    const sourceText = terms.source === 'hko' 
        ? '✅ 節氣資料來源：Solarterm.json（香港天文台精準資料）' 
        : '📌 節氣資料來源：本地標準公式';

    const html = `
        <div class="lunar-line">
            <strong>農曆</strong>　${baziResult.lunar.full}　${baziResult.branches.hour}時
        </div>

        ${pillarsHTML}

        ${fiveHTML}

        <div class="current-term">
            現在節氣：${currentTerm.name}　<span style="font-size:0.7em; color:#666;">（${currentTerm.type}）</span>
        </div>

        <div class="days-container">
            <div class="days-box">
                距離上一個節令<br>
                <strong>${prevJie.name}</strong>　${prevJie.date}<br>
                <span style="font-size:1.3em; color:#8B4513;">${daysToPrev} 天</span>
            </div>
            <div class="days-box">
                距離下一個節令<br>
                <strong>${nextJie.name}</strong>　${nextJie.date}<br>
                <span style="font-size:1.3em; color:#8B4513;">${daysToNext} 天</span>
            </div>
        </div>

        <!-- 大運表保持原樣 -->
        <p style="margin:15px 0 8px; color:#666; font-size:1.05em;">大運表（${forward ? '順行' : '逆行'} • 上運 ${luckStart} 歲）</p>
        <table class="daiyun">
            <tr>${daYears.slice().reverse().map(y => `<td>${y}</td>`).join('')}</tr>
            <tr>${daStems.slice().reverse().map(s => `<td><span style="color:${colorMap[s]||'black'}">${s}</span></td>`).join('')}</tr>
            <tr>${daBranches.slice().reverse().map(b => `<td><span style="color:${colorMap[b]||'black'}">${b}</span></td>`).join('')}</tr>
        </table>

        <div class="source-info">
            ${sourceText}
        </div>
    `;

    document.getElementById('here').innerHTML = html;
}

// 初始載入
const now = new Date();
const nowInHK = new Date(now.getTime() + 8 * 3600 * 1000);
document.getElementById('mydate').value = nowInHK.toISOString().split('T')[0];
document.getElementById('mytime').value = nowInHK.toISOString().split('T')[1].slice(0, 5);
document.getElementById('gender').value = '男';

queryBaziFate();
</script>
</body>
</html>
